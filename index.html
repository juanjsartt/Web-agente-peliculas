<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Recomendador de Películas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
    height:100vh;
}

.chat-container{
    width:100%;
    max-width:900px;
    height:100vh;
    margin:auto;
    background:white;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

.header{
    background:#0f172a;
    color:white;
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-size:20px;
}

.clear-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}

.message{
    margin-bottom:15px;
    padding:12px 15px;
    border-radius:12px;
    max-width:80%;
    white-space:pre-wrap;
    line-height:1.5;
}

.user{
    margin-left:auto;
    background:#2563eb;
    color:white;
}

.bot{
    background:white;
    border:1px solid #d1d5db;
}

.input-area{
    padding:15px;
    display:flex;
    gap:10px;
    border-top:1px solid #ddd;
}

.input-area input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-area button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.input-area button:hover{
    opacity:.9;
}

@media(max-width:768px){

    .message{
        max-width:90%;
    }

    .header h2{
        font-size:16px;
    }

}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        <h2>🎬 Recomendador de Películas</h2>
        <button class="clear-btn" onclick="limpiarConversacion()">
            Nueva conversación
        </button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input
            id="mensaje"
            type="text"
            placeholder="Escribe tu mensaje..."
            onkeypress="if(event.key==='Enter') enviarMensaje()"
        >
        <button onclick="enviarMensaje()">Enviar</button>
    </div>

</div>

<script>

const API_URL = "https://agente-peliculas-pkve.onrender.com";

let sessionId = localStorage.getItem("session_id") || "";

const chatBox = document.getElementById("chatBox");

function agregarMensaje(texto, tipo){

    const div = document.createElement("div");

    div.classList.add("message");
    div.classList.add(tipo);

    div.textContent = texto;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function enviarMensaje(){

    const input = document.getElementById("mensaje");

    const mensaje = input.value.trim();

    if(!mensaje) return;

    agregarMensaje(mensaje,"user");

    input.value="";

    const loading = document.createElement("div");
    loading.className = "message bot";
    loading.id = "loading";
    loading.textContent = "Escribiendo...";
    chatBox.appendChild(loading);

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        const payload = {
            mensaje: mensaje
        };

        if(sessionId){
            payload.session_id = sessionId;
        }

        const response = await fetch(
            `${API_URL}/consultar`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        document.getElementById("loading").remove();

        sessionId = data.session_id;

        localStorage.setItem(
            "session_id",
            sessionId
        );

        agregarMensaje(
            data.respuesta,
            "bot"
        );

    }
    catch(error){

        document.getElementById("loading")?.remove();

        agregarMensaje(
            "Error conectando con la API.",
            "bot"
        );

        console.error(error);
    }
}

async function limpiarConversacion(){

    if(sessionId){

        try{

            await fetch(
                `${API_URL}/limpiar/${sessionId}`,
                {
                    method:"DELETE"
                }
            );

        }catch(error){
            console.error(error);
        }

    }

    localStorage.removeItem("session_id");

    sessionId = "";

    chatBox.innerHTML = "";

    agregarMensaje(
        "Conversación reiniciada. ¿Qué tipo de películas te gustan?",
        "bot"
    );
}

window.onload = () => {

    agregarMensaje(
        "¡Hola! 👋 Soy tu asistente de recomendaciones de películas.",
        "bot"
    );

};
</script>

</body>
</html>
