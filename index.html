<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎬 Agente Recomendador de Películas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
    height:100vh;
}

.chat-container{
    width:100%;
    max-width:1000px;
    height:100vh;
    margin:auto;
    background:white;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

.header{
    background:#0f172a;
    color:white;
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-size:20px;
}

.clear-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.clear-btn:hover{
    opacity:.9;
}

.session-panel{
    background:#e2e8f0;
    padding:12px;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:12px;
}

.session-info{
    font-size:14px;
}

.session-id{
    font-weight:bold;
    color:#2563eb;
}

.memory{
    color:#475569;
}

.session-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.session-actions input{
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    min-width:250px;
}

.session-actions button{
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    background:#334155;
    color:white;
}

.session-actions button:hover{
    opacity:.9;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}

.message{
    margin-bottom:15px;
    padding:12px 15px;
    border-radius:12px;
    max-width:80%;
    line-height:1.5;
    white-space:pre-wrap;
}

.user{
    margin-left:auto;
    background:#2563eb;
    color:white;
}

.bot{
    background:white;
    border:1px solid #d1d5db;
}

.input-area{
    padding:15px;
    display:flex;
    gap:10px;
    border-top:1px solid #ddd;
}

.input-area input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-area button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.input-area button:hover{
    opacity:.9;
}

.suggestions-container{
    background:#f8fafc;
    border-bottom:1px solid #e2e8f0;
    padding:15px;
}

.suggestions{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.chip{
    background:white;
    border:1px solid #cbd5e1;
    border-radius:999px;
    padding:10px 16px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
    font-weight:500;
}

.chip:hover{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

@media(max-width:768px){

    .session-panel{
        flex-direction:column;
        align-items:flex-start;
    }

    .session-actions{
        width:100%;
    }

    .session-actions input{
        width:100%;
        min-width:auto;
    }

    .message{
        max-width:95%;
    }
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        <h2>🎬 Agente Recomendador de Películas</h2>

        <button
            class="clear-btn"
            onclick="limpiarConversacion()">
            Nueva conversación
        </button>
    </div>

    <div class="session-panel">

        <div class="session-info">

            <div>
                Sesión:
                <span
                    id="sessionDisplay"
                    class="session-id">
                    Sin iniciar
                </span>
            </div>

            <div class="memory">
                Mensajes en memoria:
                <span id="memoryCount">0</span>
            </div>

        </div>

        <div class="session-actions">

            <button onclick="copiarSesion()">
                Copiar ID
            </button>

            <input
                id="sessionInput"
                type="text"
                placeholder="Pegar Session ID existente">

            <button onclick="cargarSesion()">
                Continuar Chat
            </button>

        </div>

    </div>

    <div class="suggestions-container">

        <p style="text-align:center; margin-bottom:10px; color:#64748b;">
            💡 Sugerencias para empezar
        </p>
    
        <div id="suggestions" class="suggestions"></div>

    </div>
    
    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">

        <input
            id="mensaje"
            type="text"
            placeholder="Escribe tu mensaje..."
            onkeypress="if(event.key==='Enter') enviarMensaje()">

        <button onclick="enviarMensaje()">
            Enviar
        </button>

    </div>

</div>

<script>

const API_URL =
    "https://agente-peliculas-pkve.onrender.com";

let sessionId =
    localStorage.getItem("session_id") || "";

const chatBox =
    document.getElementById("chatBox");

const sugerencias = [
    "Ciencia ficción",
    "Comedia",
    "Terror",
    "Romance",
    "Drama",
    "Suspenso",
    "Acción",
    "Aventura",
    "Animación",
    "Fantasía",
    "Misterio",
    "Crimen",
    "Thriller psicológico",
    "Superhéroes",
    "Cyberpunk",
    "Distopías",
    "Viajes en el tiempo",
    "Apocalipsis",
    "Zombies",
    "Aliens",
    "Anime",
    "Basadas en hechos reales",
    "Ganadoras del Oscar",
    "Películas familiares",
    "Películas para llorar",
    "Películas para reír",
    "Películas de culto",
    "Western",
    "Musicales",
    "Guerra",
    "Espionaje",
    "Detectives",
    "Vampiros",
    "Monstruos",
    "Robots",
    "IA y tecnología",
    "Comedias románticas",
    "Terror sobrenatural"
];

function renderizarSugerencias(){
    const container =
        document.getElementById(
            "suggestions"
        );

    container.innerHTML = "";

    const copia =
        [...sugerencias]
        .sort(() => Math.random() - 0.5)
        .slice(0,5);

    copia.forEach(texto => {

        const chip =
            document.createElement(
                "button"
            );

        chip.className = "chip";

        chip.textContent = texto;

        chip.onclick = () => {

            document.getElementById(
                "mensaje"
            ).value =
                `Recomiéndame películas de ${texto}`;

            enviarMensaje();
        };

        container.appendChild(chip);

    });
}
    
function actualizarSesion(){

    document.getElementById(
        "sessionDisplay"
    ).textContent =
        sessionId || "Sin iniciar";
}

function agregarMensaje(texto,tipo){

    const div =
        document.createElement("div");

    div.classList.add("message");
    div.classList.add(tipo);

    div.textContent = texto;

    chatBox.appendChild(div);

    chatBox.scrollTop =
        chatBox.scrollHeight;
}

async function enviarMensaje(){

    const input =
        document.getElementById(
            "mensaje"
        );

    const mensaje =
        input.value.trim();

    if(!mensaje) return;

    agregarMensaje(
        mensaje,
        "user"
    );

    input.value = "";

    const loading =
        document.createElement("div");

    loading.id = "loading";

    loading.className =
        "message bot";

    loading.textContent =
        "🎬 Pensando...";

    chatBox.appendChild(
        loading
    );

    try{

        const payload = {
            mensaje: mensaje
        };

        if(sessionId){
            payload.session_id =
                sessionId;
        }

        const response =
            await fetch(
                `${API_URL}/consultar`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":
                        "application/json"
                    },
                    body: JSON.stringify(
                        payload
                    )
                }
            );

        const data =
            await response.json();

        document.getElementById(
            "loading"
        )?.remove();

        sessionId =
            data.session_id;

        localStorage.setItem(
            "session_id",
            sessionId
        );

        actualizarSesion();

        document.getElementById(
            "memoryCount"
        ).textContent =
            data.mensajes_en_memoria;

        agregarMensaje(
            data.respuesta,
            "bot"
        );

        renderizarSugerencias();
    }
    catch(error){

        document.getElementById(
            "loading"
        )?.remove();

        agregarMensaje(
            "❌ Error conectando con la API.",
            "bot"
        );

        console.error(error);
    }
}

function copiarSesion(){

    if(!sessionId){

        alert(
            "No existe una sesión activa."
        );

        return;
    }

    navigator.clipboard.writeText(
        sessionId
    );

    alert(
        "Session ID copiado."
    );
}

function cargarSesion(){

    const nuevaSesion =
        document.getElementById(
            "sessionInput"
        ).value.trim();

    if(!nuevaSesion){

        alert(
            "Ingresa un Session ID."
        );

        return;
    }

    sessionId = nuevaSesion;

    localStorage.setItem(
        "session_id",
        sessionId
    );

    actualizarSesion();

    agregarMensaje(
        `🔄 Sesión cargada:
${sessionId}`,
        "bot"
    );
}

async function limpiarConversacion(){

    if(sessionId){

        try{

            await fetch(
                `${API_URL}/limpiar/${sessionId}`,
                {
                    method:"DELETE"
                }
            );

        }
        catch(error){
            console.error(error);
        }

    }

    localStorage.removeItem(
        "session_id"
    );

    sessionId = "";

    document.getElementById(
        "memoryCount"
    ).textContent = "0";

    actualizarSesion();

    chatBox.innerHTML = "";

    agregarMensaje(
        "🎬 Conversación reiniciada.\n¿Qué tipo de películas te gustan?",
        "bot"
    );
}

window.onload = () => {

    actualizarSesion();

    renderizarSugerencias();

    setInterval(
        renderizarSugerencias,
        15000
    );

    agregarMensaje(
        "👋 ¡Hola! Soy tu asistente de recomendaciones de películas.",
        "bot"
    );

    if(sessionId){

        agregarMensaje(
            `💾 Sesión recuperada:\n${sessionId}`,
            "bot"
        );

    }
    
};

</script>

</body>
</html>
